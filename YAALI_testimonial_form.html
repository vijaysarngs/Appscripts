<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YAALI Project Testimonials</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root { --blue:#10067A; --gray:#475569; --border:#e5e7eb; }

    body {
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif;
      background:#fff; color:#0f172a;
      margin:0; padding:20px;
    }

    .container {
      max-width:700px; margin:0 auto;
      background:#fff; border:1px solid var(--border);
      border-radius:16px; box-shadow:0 2px 10px rgba(2,6,23,.08);
      padding:28px;
    }

    h2 {
      color:var(--blue); text-align:center;
      margin:0 0 8px; font-size:24px;
    }

    .desc {
      color:var(--gray); text-align:center;
      margin:0 0 18px; font-size:14px;
    }

    label {
      display:block; margin-top:12px;
      font-weight:600;
    }

    input, select, textarea {
      width:100%; padding:10px 12px;
      border:1px solid #cbd5e1; border-radius:8px;
      font-size:14px; margin-top:4px; box-sizing:border-box;
    }

    textarea { resize:vertical; min-height:90px; }

    progress {
      width:100%; height:8px; margin-top:6px; display:none;
      appearance:none; background:#f3f4f6; border-radius:4px;
    }
    progress::-webkit-progress-value {
      background:var(--blue); border-radius:4px;
    }

    .btn {
      background:var(--blue); color:#fff; border:none;
      border-radius:8px; padding:12px 20px;
      font-size:16px; font-weight:600;
      cursor:pointer; width:100%;
      margin-top:24px;
    }

    .btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .msg {
      text-align:center; font-size:15px; margin-top:16px;
    }

    .warn-box {
      background:#fff7d6;
      border:1px solid #facc15;
      padding:12px;
      border-radius:8px;
      font-size:13px;
      margin-top:16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>YAALI Project Testimonials</h2>
    <p class="desc">Share your experience and feedback.</p>

    <form id="form">
      <label>Project</label>
      <select id="project" required>
        <option value="">Select Project</option>
      </select>

      <input
        id="customProject"
        placeholder="Enter project name"
        style="display:none; margin-top:6px;"
      />

      <label>Name</label>
      <input id="org" required placeholder="Your name">

      <label>Country / Region</label>
      <input id="region" required placeholder="Your country or region">

      <label>Testimonial / Feedback</label>
      <textarea id="text" required placeholder="Write your testimonial..."></textarea>

      <div class="warn-box">
        ⚠ <b>Uploading a video may take 1–3 minutes.</b><br>
        Do not close this tab during upload.<br><br>
        📌 <b>Maximum allowed file size: 50 MB</b><br>
        Suitable for ~5-minute 480p–720p videos.
      </div>

      <label style="margin-top:12px;">Upload Video (optional)</label>
      <input id="file" type="file" accept="video/*">
      <progress id="uploadProgress" value="0" max="100"></progress>
      <p id="uploadInfo" style="font-size:13px; color:#475569;">
        No video selected.
      </p>

      <button class="btn" id="submit" type="submit">Submit</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script>
    let uploadedFile = null;

    /*********** Load Project List ***********/
    if (typeof google !== 'undefined' && google.script) {
      google.script.run.withSuccessHandler(cfg => {
        const sel = document.getElementById("project");

        cfg.projects.forEach(p => {
          const o = document.createElement("option");
          o.value = o.textContent = p;
          sel.appendChild(o);
        });

        const other = document.createElement("option");
        other.value = "__other__";
        other.textContent = "Other / Not listed";
        sel.appendChild(other);
      }).getConfig();
    } else {
      console.warn("Google Script environment not found. Projects won't load locally.");
    }

    /*********** Toggle custom project ***********/
    document.getElementById("project").addEventListener("change", e => {
      document.getElementById("customProject").style.display =
        e.target.value === "__other__" ? "block" : "none";
    });

    /*********** Optional Video Upload ***********/
    document.getElementById("file").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) {
        uploadedFile = null;
        document.getElementById("uploadInfo").textContent = "No video selected.";
        return;
      }

      const maxMB = 50;
      const sizeMB = file.size / (1024 * 1024);

      if (sizeMB > maxMB) {
        uploadedFile = null;
        document.getElementById("uploadInfo").style.color = "#b91c1c";
        document.getElementById("uploadInfo").textContent =
          `❌ File too large. Max ${maxMB} MB.`;
        return;
      }

      const info = document.getElementById("uploadInfo");
      info.style.color = "#475569";
      info.textContent = `Encoding video (${sizeMB.toFixed(1)} MB)...`;

      const bar = document.getElementById("uploadProgress");
      bar.style.display = "block";
      bar.value = 20;

      const reader = new FileReader();
      reader.onload = function() {
        uploadedFile = {
          fileData: reader.result.split(",")[1],
          mimeType: file.type,
          fileName: file.name
        };

        bar.value = 100;
        setTimeout(() => (bar.style.display = "none"), 500);

        info.style.color = "green";
        info.textContent = "✅ Video ready to upload.";
      };

      reader.readAsDataURL(file);
    });

    /*********** Submit Form ***********/
    document.getElementById("form").addEventListener("submit", function(ev) {
      ev.preventDefault();

      const msg = document.getElementById("msg");
      msg.textContent = "";

      const selected = document.getElementById("project").value;
      const projectName =
        selected === "__other__"
          ? document.getElementById("customProject").value.trim()
          : selected;

      if (!projectName) {
        msg.style.color = "#b91c1c";
        msg.textContent = "❌ Please provide a project name.";
        return;
      }

      const formData = {
        projectName,
        orgName: document.getElementById("org").value,
        region: document.getElementById("region").value,
        testimonial: document.getElementById("text").value,
        ...(uploadedFile || {})
      };

      const btn = document.getElementById("submit");
      btn.disabled = true;
      btn.textContent = "Submitting...";

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(() => {
            msg.style.color = "green";
            msg.textContent = "✅ Submitted successfully!";
            document.getElementById("form").reset();
            uploadedFile = null;
            document.getElementById("customProject").style.display = "none";
            document.getElementById("uploadInfo").textContent = "No video selected.";
            btn.disabled = false;
            btn.textContent = "Submit";
          })
          .withFailureHandler(err => {
            msg.style.color = "#b91c1c";
            msg.textContent = "❌ Error: " + err.message;
            btn.disabled = false;
            btn.textContent = "Submit";
          })
          .submitTestimonial(formData);
      } else {
        // Fallback for local testing
        console.log("Form Data to submit:", formData);
        msg.style.color = "green";
        msg.textContent = "✅ Simulated submit (No Google Script found).";
        btn.disabled = false;
        btn.textContent = "Submit";
      }
    });
  </script>
</body>
</html>
